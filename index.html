<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Ball Adventure - Deluxe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f051d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  #gameWrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 800px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
  }

  .hud-item {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
  }

  .hud-item span { color: #00eaff; }

  #gameCanvas {
    border-radius: 12px;
    border: 4px solid #2a1a4a;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    background: #000;
  }

  #overlay {
    position: absolute;
    top: 54px; 
    left: 4px;
    width: 792px;
    height: 472px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(15, 10, 30, 0.95);
    border-radius: 8px;
    z-index: 10;
  }

  .hidden { display: none !important; }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 60px;
    color: #ff3c3c;
    text-shadow: 3px 3px 0 #7a0000;
    margin-bottom: 10px;
  }

  .menu-buttons {
    display: flex;
    gap: 15px;
    margin-top: 20px;
  }

  .btn {
    padding: 12px 30px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn-primary { background: #ff3c3c; color: white; box-shadow: 0 4px 0 #a00; }
  .btn-primary:hover { background: #ff5555; transform: translateY(-2px); }
  
  .btn-shop { background: #ffd700; color: #333; box-shadow: 0 4px 0 #b8860b; }
  .btn-shop:hover { background: #ffea00; }

  #shopGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-top: 20px;
  }

  .skin-card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    border: 2px solid transparent;
    cursor: pointer;
  }

  .skin-card.active { border-color: #00eaff; background: rgba(0,234,255,0.1); }
  
  .skin-preview {
    width: 40px; height: 40px;
    border-radius: 50%;
    margin: 0 auto 10px;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .price { font-size: 14px; color: #ffd700; font-weight: 900; }
</style>
</head>
<body>

<div id="gameWrapper">
  <div id="hud">
    <div class="hud-item">PONTOS: <span id="score">0</span></div>
    <div class="hud-item">GEMAS: <span id="gems">0</span></div>
    <div class="hud-item">VIDAS: <span id="lives">3</span></div>
    <div class="hud-item">NÍVEL: <span id="level">1</span></div>
  </div>
  
  <canvas id="gameCanvas" width="800" height="480"></canvas>

  <div id="overlay">
    <div id="mainMenu">
      <h1>RED BALL</h1>
      <p style="color: #aaa; margin-bottom: 20px; text-align: center;">Rola, salta e compra skins!</p>
      <div class="menu-buttons">
        <button class="btn btn-primary" onclick="startGame()">JOGAR</button>
        <button class="btn btn-shop" onclick="openShop()">LOJA</button>
      </div>
    </div>

    <div id="shopMenu" class="hidden" style="width: 90%; text-align: center;">
      <h2 style="color: white; font-family: 'Fredoka One';">LOJA DE SKINS</h2>
      <p style="color: #ffd700; margin-bottom: 15px;">Teu Banco: <span id="bankGems">0</span> 💎</p>
      <div id="shopGrid"></div>
      <button class="btn btn-primary" style="margin-top: 20px;" onclick="closeShop()">VOLTAR</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const mainMenu = document.getElementById('mainMenu');
const shopMenu = document.getElementById('shopMenu');

// --- CONFIGURAÇÕES DE JOGO ---
let state = 'menu';
let currentLevel = 0;
let lives = 3;
let score = 0;
let bankGems = 0; 
let levelGems = 0;
let activeSkin = 'red';
let unlockedSkins = ['red'];

const SKINS = {
  'red': { name: 'Vermelho', color: '#ff3c3c', price: 0 },
  'blue': { name: 'Oceano', color: '#3498db', price: 300 },
  'gold': { name: 'Ouro', color: '#f1c40f', price: 800 },
  'neon': { name: 'Cyber', color: '#00eaff', price: 1500 }
};

const LEVELS = [
  // Níveis originais atualizados e 5 novos
  { bg:['#1a2a6c','#b21f1f'], platforms:[{x:0,y:440,w:800,h:40,c:'#5c3d1e'},{x:200,y:350,w:150,h:20,c:'#7a5c2e'}], gems:[{x:250,y:310}], enemies:[{x:400,y:410,w:30,h:30,vx:2,range:200}], goal:{x:700,y:400}, startX:50, startY:380 },
  { bg:['#0f2027','#203a43'], platforms:[{x:0,y:440,w:200,h:40,c:'#2e4a2e'},{x:300,y:350,w:200,h:20,c:'#2e4a2e'}], gems:[{x:350,y:300}], enemies:[{x:350,y:320,w:30,h:30,vx:1.5,range:100}], goal:{x:450,y:310}, startX:50, startY:380 },
  { bg:['#3a0000','#1a0000'], platforms:[{x:0,y:440,w:800,h:40,c:'#4a1a1a'},{x:100,y:300,w:100,h:20,c:'#6a2a2a'}], gems:[{x:150,y:260}], enemies:[{x:200,y:410,w:35,h:35,vx:3,range:400}], goal:{x:750,y:400}, startX:30, startY:380 },
  // Nível 4: Floresta Noturna
  { bg:['#0d230d','#1a3a1a'], platforms:[{x:0,y:440,w:150,h:40,c:'#1e3d1e'},{x:250,y:380,w:100,h:20,c:'#2e5c2e'},{x:450,y:320,w:100,h:20,c:'#2e5c2e'},{x:650,y:260,w:150,h:20,c:'#2e5c2e'}], gems:[{x:300,y:340},{x:500,y:280}], enemies:[{x:650,y:230,w:30,h:30,vx:2,range:100}], goal:{x:750,y:220}, startX:30, startY:380 },
  // Nível 5: Caverna de Cristais
  { bg:['#2c003e','#512b58'], platforms:[{x:0,y:440,w:800,h:40,c:'#333'},{x:200,y:300,w:400,h:20,c:'#4b0082'}], gems:[{x:300,y:260},{x:400,y:260},{x:500,y:260}], enemies:[{x:210,y:270,w:30,h:30,vx:4,range:350}], goal:{x:700,y:400}, startX:30, startY:380 },
  // Nível 6: Montanha Gelada
  { bg:['#83a4d4','#b6fbff'], platforms:[{x:0,y:440,w:200,h:40,c:'#fff'},{x:250,y:380,w:60,h:20,c:'#fff'},{x:350,y:320,w:60,h:20,c:'#fff'},{x:450,y:260,w:60,h:20,c:'#fff'},{x:600,y:200,w:200,h:20,c:'#fff'}], gems:[{x:650,y:160},{x:700,y:160}], enemies:[{x:0,y:410,w:40,h:40,vx:1,range:150}], goal:{x:750,y:160}, startX:30, startY:380 },
  // Nível 7: O Vulcão
  { bg:['#4b1212','#ff4b2b'], platforms:[{x:0,y:440,w:100,h:40,c:'#222'},{x:200,y:380,w:100,h:20,c:'#222'},{x:400,y:320,w:100,h:20,c:'#222'},{x:600,y:260,w:100,h:20,c:'#222'},{x:750,y:200,w:50,h:20,c:'#222'}], gems:[{x:250,y:340},{x:450,y:280},{x:650,y:220}], enemies:[{x:200,y:350,w:30,h:30,vx:5,range:500}], goal:{x:770,y:160}, startX:20, startY:380 },
  // Nível 8: O Abismo Final
  { bg:['#000','#111'], platforms:[{x:0,y:440,w:800,h:40,c:'#333'},{x:350,y:200,w:100,h:20,c:'#ff3c3c'}], gems:[{x:400,y:150}], enemies:[{x:10,y:410,w:20,h:20,vx:8,range:750},{x:350,y:170,w:30,h:30,vx:2,range:80}], goal:{x:750,y:400}, startX:20, startY:380 }
];

let player, platformsObj, gemsObj, enemiesObj, goalObj, keys = {};

function initLevel() {
  const lvl = LEVELS[currentLevel % LEVELS.length];
  player = { x:lvl.startX, y:lvl.startY, w:34, h:34, vx:0, vy:0, onGround:false, dead:false, color:SKINS[activeSkin].color };
  platformsObj = lvl.platforms.map(p => ({...p}));
  gemsObj = lvl.gems.map(g => ({...g, collected:false}));
  enemiesObj = lvl.enemies.map(e => ({...e, startX:e.x, dir:1}));
  goalObj = {...lvl.goal};
  levelGems = 0;
}

// --- LOJA ---
function openShop() {
  mainMenu.classList.add('hidden');
  shopMenu.classList.remove('hidden');
  renderShop();
}

function closeShop() {
  shopMenu.classList.add('hidden');
  mainMenu.classList.remove('hidden');
}

function renderShop() {
  document.getElementById('bankGems').textContent = bankGems;
  const grid = document.getElementById('shopGrid');
  grid.innerHTML = '';
  
  for(let id in SKINS) {
    const skin = SKINS[id];
    const isUnlocked = unlockedSkins.includes(id);
    const isActive = activeSkin === id;
    
    const card = document.createElement('div');
    card.className = `skin-card ${isActive ? 'active' : ''}`;
    card.onclick = () => {
      if(isUnlocked) {
        activeSkin = id;
      } else if(bankGems >= skin.price) {
        bankGems -= skin.price;
        unlockedSkins.push(id);
        activeSkin = id;
      }
      renderShop();
    };
    
    card.innerHTML = `
      <div class="skin-preview" style="background:${skin.color}"></div>
      <div style="color:white; font-size:12px; margin-bottom:5px;">${skin.name}</div>
      <div class="price">${isUnlocked ? (isActive ? 'EQUIPADO' : 'SELECIONAR') : skin.price + ' 💎'}</div>
    `;
    grid.appendChild(card);
  }
}

// --- JOGO ---
function startGame() {
  overlay.classList.add('hidden');
  state = 'play';
  initLevel();
  requestAnimationFrame(gameLoop);
}

function update() {
  if(state !== 'play') return;

  if(keys['ArrowLeft'] || keys['a']) player.vx = -4.5;
  else if(keys['ArrowRight'] || keys['d']) player.vx = 4.5;
  else player.vx *= 0.8;

  player.vy += 0.6;
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;
  platformsObj.forEach(p => {
    if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y < p.y + p.h) {
      if(player.vy > 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  });

  if((keys['ArrowUp'] || keys[' ']) && player.onGround) player.vy = -12;

  gemsObj.forEach(g => {
    if(!g.collected && Math.abs(player.x - g.x) < 30 && Math.abs(player.y - g.y) < 30) {
      g.collected = true;
      levelGems++;
      score += 100;
    }
  });

  enemiesObj.forEach(e => {
    e.x += e.vx * e.dir;
    if(e.x > e.startX + e.range || e.x < e.startX) e.dir *= -1;
    if(Math.abs(player.x - e.x) < 25 && Math.abs(player.y - e.y) < 25) {
        if(player.vy > 0) { e.x = -1000; player.vy = -8; score += 200; }
        else { lives--; initLevel(); if(lives <= 0) location.reload(); }
    }
  });

  if(Math.abs(player.x - goalObj.x) < 40 && Math.abs(player.y - goalObj.y) < 40) {
    bankGems += levelGems;
    currentLevel++;
    initLevel();
  }

  if(player.y > 480) { lives--; initLevel(); if(lives <= 0) location.reload(); }

  document.getElementById('score').textContent = score;
  document.getElementById('gems').textContent = levelGems;
  document.getElementById('lives').textContent = lives;
  document.getElementById('level').textContent = currentLevel + 1;
}

function draw() {
  const lvl = LEVELS[currentLevel % LEVELS.length];
  const g = ctx.createLinearGradient(0,0,0,480);
  g.addColorStop(0, lvl.bg[0]); g.addColorStop(1, lvl.bg[1]);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,800,480);

  platformsObj.forEach(p => { ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h); });
  ctx.fillStyle = '#00eaff';
  gemsObj.forEach(g => { if(!g.collected) { ctx.beginPath(); ctx.arc(g.x, g.y, 8, 0, Math.PI*2); ctx.fill(); }});
  ctx.fillStyle = '#ff8800';
  enemiesObj.forEach(e => { ctx.fillRect(e.x, e.y, e.w, e.h); });
  ctx.fillStyle = '#fff';
  ctx.fillRect(goalObj.x, goalObj.y, 10, 40); // Bandeira simples

  // Jogador com a skin selecionada
  ctx.fillStyle = SKINS[activeSkin].color;
  ctx.beginPath(); ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/2, 0, Math.PI*2); ctx.fill();
}

function gameLoop() {
  update();
  draw();
  if(state === 'play') requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);
</script>
</body>
</html>
