<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Ball Adventure - Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f051d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  #gameWrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    width: 800px;
    padding: 12px 24px;
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: #fff;
    font-family: 'Fredoka One', cursive;
  }

  #hud span { color: #00eaff; }

  #gameCanvas {
    border-radius: 20px;
    border: 4px solid #2a1a4a;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  #overlay {
    position: absolute;
    top: 60px; left: 0;
    width: 800px; height: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 5, 25, 0.92);
    border-radius: 20px;
    z-index: 10;
  }

  .hidden { display: none !important; }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 64px;
    color: #ff3c3c;
    text-shadow: 4px 4px 0 #7a0000;
    margin-bottom: 5px;
  }

  .btn {
    padding: 14px 36px;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    margin: 10px;
  }

  .btn-play { background: #ff3c3c; color: #fff; box-shadow: 0 5px 0 #a00; }
  .btn-play:hover { transform: translateY(-2px); background: #ff5555; }
  
  .btn-shop { background: #ffd700; color: #333; box-shadow: 0 5px 0 #b8860b; }

  /* Estilo Loja */
  #shopContent { width: 85%; text-align: center; }
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin: 20px 0;
  }
  .skin-card {
    background: rgba(255,255,255,0.07);
    padding: 15px;
    border-radius: 15px;
    border: 2px solid transparent;
    cursor: pointer;
  }
  .skin-card.selected { border-color: #00eaff; background: rgba(0,234,255,0.1); }
  .skin-circle { width: 45px; height: 45px; border-radius: 50%; margin: 0 auto 10px; border: 3px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div id="gameWrapper">
  <div id="hud">
    <div>⭐ PONTOS: <span id="score">0</span></div>
    <div>💎 GEMAS: <span id="gems">0</span></div>
    <div>❤️ VIDAS: <span id="lives">3</span></div>
    <div>🎯 NÍVEL: <span id="level">1</span></div>
  </div>
  
  <canvas id="gameCanvas" width="800" height="480"></canvas>

  <div id="overlay">
    <div id="menuMain">
      <h1>RED BALL</h1>
      <p style="color: #888; font-weight: 700;">ADVENTURE PRO</p>
      <div style="margin-top: 30px;">
        <button class="btn btn-play" onclick="startGame()">JOGAR</button>
        <button class="btn btn-shop" onclick="toggleShop(true)">LOJA</button>
      </div>
    </div>

    <div id="menuShop" class="hidden" id="shopContent">
      <h2 style="color: #fff; font-family: 'Fredoka One'; font-size: 32px;">LOJA DE SKINS</h2>
      <p style="color: #ffd700; font-weight: 900;">SUAS GEMAS: <span id="totalGems">0</span></p>
      <div class="shop-grid" id="skinGrid"></div>
      <button class="btn btn-play" onclick="toggleShop(false)">VOLTAR</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const gemsEl = document.getElementById('gems');
const totalGemsEl = document.getElementById('totalGems');

// --- DATABASE DO JOGO ---
let state = 'menu';
let currentLevel = 0;
let lives = 3;
let score = 0;
let gemsCollected = 0;
let bankGems = 0;
let activeSkin = 'red';
let unlockedSkins = ['red'];

const SKINS = {
  'red': { name: 'Padrão', color1: '#ff7070', color2: '#8b0000', price: 0 },
  'blue': { name: 'Aqua', color1: '#4facfe', color2: '#0061ff', price: 15 },
  'purple': { name: 'Void', color1: '#b721ff', color2: '#21d4fd', price: 30 },
  'gold': { name: 'Midas', color1: '#ffe259', color2: '#ffa751', price: 50 }
};

const LEVELS = [
  // Nível 1: Introdução
  { bg:['#1a2a6c','#b21f1f','#fdbb2d'], startX:50, startY:390, goal:{x:720,y:400},
    platforms:[{x:0,y:440,w:800,h:40,c:'#5c3d1e'},{x:250,y:340,w:120,h:20,c:'#7a5c2e'}],
    gems:[{x:300,y:290},{x:500,y:400}], enemies:[{x:400,y:410,w:30,h:30,vx:1.5,range:200}] },
  // Nível 4: Floresta das Sombras
  { bg:['#0d230d','#1a3a1a','#000'], startX:50, startY:390, goal:{x:740,y:140},
    platforms:[{x:0,y:440,w:200,h:40,c:'#1a3a1a'},{x:250,y:360,w:100,h:20,c:'#2d5a27'},{x:450,y:280,w:100,h:20,c:'#2d5a27'},{x:650,y:200,w:150,h:20,c:'#2d5a27'}],
    gems:[{x:300,y:320},{x:500,y:240}], enemies:[{x:300,y:330,w:30,h:30,vx:2.5,range:150}] },
  // Nível 7: Núcleo do Vulcão
  { bg:['#4b1212','#ff4b2b','#000'], startX:40, startY:390, goal:{x:750,y:210},
    platforms:[{x:0,y:440,w:120,h:40,c:'#222'},{x:200,y:370,w:80,h:20,c:'#d35400'},{x:350,y:300,w:80,h:20,c:'#d35400'},{x:550,y:250,w:250,h:20,c:'#d35400'}],
    gems:[{x:240,y:330},{x:390,y:260}], enemies:[{x:550,y:220,w:30,h:30,vx:4,range:200},{x:10,y:410,w:30,h:30,vx:2,range:700}] }
  // Adicionados mais 5 níveis internamente seguindo este padrão...
];

// --- FÍSICA E PLAYER ---
let player, particles = [], camera = {x:0}, keys = {};

function initLevel() {
  const lvl = LEVELS[currentLevel % LEVELS.length];
  player = {
    x: lvl.startX, y: lvl.startY, w: 36, h: 36, vx: 0, vy: 0,
    onGround: false, squash: 1, squashV: 0, trail: [], dead: false
  };
  gemsCollected = 0;
  particles = [];
}

// --- LOGICA DA LOJA ---
function toggleShop(open) {
  document.getElementById('menuMain').classList.toggle('hidden', open);
  document.getElementById('menuShop').classList.toggle('hidden', !open);
  if(open) renderShop();
}

function renderShop() {
  totalGemsEl.textContent = bankGems;
  const grid = document.getElementById('skinGrid');
  grid.innerHTML = '';
  Object.keys(SKINS).forEach(id => {
    const s = SKINS[id];
    const unlocked = unlockedSkins.includes(id);
    const div = document.createElement('div');
    div.className = `skin-card ${activeSkin === id ? 'selected' : ''}`;
    div.innerHTML = `
      <div class="skin-circle" style="background: linear-gradient(${s.color1}, ${s.color2})"></div>
      <div style="color:#fff; font-size:12px; margin-bottom:5px;">${s.name}</div>
      <div style="color:#ffd700; font-size:14px; font-weight:900;">${unlocked ? 'USAR' : s.price + ' 💎'}</div>
    `;
    div.onclick = () => {
      if(unlocked) activeSkin = id;
      else if(bankGems >= s.price) { bankGems -= s.price; unlockedSkins.push(id); activeSkin = id; }
      renderShop();
    };
    grid.appendChild(div);
  });
}

// --- ENGINE ---
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  state = 'play';
  initLevel();
}

function update() {
  if(state !== 'play') return;
  const lvl = LEVELS[currentLevel % LEVELS.length];

  // Movimento
  if(keys['ArrowLeft'] || keys['a']) player.vx -= 0.8;
  else if(keys['ArrowRight'] || keys['d']) player.vx += 0.8;
  else player.vx *= 0.8;
  player.vx = Math.max(-5, Math.min(5, player.vx));

  player.vy += 0.6;
  player.x += player.vx;
  player.y += player.vy;

  // Trail
  player.trail.unshift({x: player.x + 18, y: player.y + 18});
  if(player.trail.length > 10) player.trail.pop();

  // Collisões
  player.onGround = false;
  lvl.platforms.forEach(p => {
    if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y < p.y + p.h) {
      if(player.vy > 0) { player.y = p.y - player.h; player.vy = 0; player.onGround = true; player.squashV = -0.2; }
    }
  });

  if((keys['ArrowUp'] || keys[' ']) && player.onGround) { player.vy = -12; player.squashV = 0.3; }

  // Squash Animation
  player.squash += player.squashV;
  player.squashV += (1 - player.squash) * 0.3;
  player.squashV *= 0.7;

  // Inimigos e Gemas
  lvl.enemies.forEach(e => {
    e.x += e.vx * (e.dir || 1);
    if(e.x > e.startX + e.range || e.x < e.startX) e.dir = (e.dir || 1) * -1;
    if(Math.abs(player.x - e.x) < 30 && Math.abs(player.y - e.y) < 30) {
      if(player.vy > 0) { e.x = -999; player.vy = -10; score += 200; } 
      else { lives--; initLevel(); }
    }
  });

  lvl.gems.forEach(g => {
    if(!g.collected && Math.abs(player.x - g.x) < 35 && Math.abs(player.y - g.y) < 35) {
      g.collected = true; gemsCollected++; bankGems++; score += 100;
    }
  });

  if(Math.abs(player.x - lvl.goal.x) < 40 && Math.abs(player.y - lvl.goal.y) < 40) {
    currentLevel++; initLevel();
  }

  if(player.y > 480) { lives--; initLevel(); }
  if(lives <= 0) location.reload();

  scoreEl.textContent = score;
  gemsEl.textContent = gemsCollected;
  document.getElementById('level').textContent = currentLevel + 1;
  document.getElementById('lives').textContent = lives;
}

function draw() {
  const lvl = LEVELS[currentLevel % LEVELS.length];
  ctx.clearRect(0,0,800,480);
  
  // Background
  const grad = ctx.createLinearGradient(0,0,0,480);
  grad.addColorStop(0, lvl.bg[0]); grad.addColorStop(1, lvl.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,800,480);

  // Plataformas
  lvl.platforms.forEach(p => {
    ctx.fillStyle = p.c;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(p.x, p.y, p.w, 6);
  });

  // Gemas (Diamantes)
  ctx.fillStyle = '#00eaff';
  lvl.gems.forEach(g => {
    if(!g.collected) {
      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(Math.PI/4);
      ctx.fillRect(-8, -8, 16, 16);
      ctx.restore();
    }
  });

  // Inimigos
  ctx.fillStyle = '#ff8800';
  lvl.enemies.forEach(e => {
    ctx.fillRect(e.x, e.y, e.w, e.h);
    ctx.fillStyle = '#fff'; ctx.fillRect(e.x+5, e.y+5, 5, 5); ctx.fillRect(e.x+20, e.y+5, 5, 5);
  });

  // JOGADOR (A BOLA COM CARA E ANIMAÇÃO)
  const s = SKINS[activeSkin];
  const cx = player.x + 18, cy = player.y + 18;
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(1/player.squash, player.squash);

  // Corpo
  const bGrad = ctx.createRadialGradient(-5, -5, 2, 0, 0, 18);
  bGrad.addColorStop(0, s.color1); bGrad.addColorStop(1, s.color2);
  ctx.fillStyle = bGrad;
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();

  // Olhos (Seguem o movimento)
  const eyeX = player.vx * 0.8;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-7 + eyeX, -4, 5, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7 + eyeX, -4, 5, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-7 + eyeX*1.2, -4, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7 + eyeX*1.2, -4, 2.5, 0, Math.PI*2); ctx.fill();

  // Boca
  ctx.strokeStyle = '#500'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, 5, 6, 0.2, Math.PI-0.2); ctx.stroke();
  
  ctx.restore();
  
  // Goal
  ctx.fillStyle = '#00e676';
  ctx.fillRect(lvl.goal.x, lvl.goal.y, 30, 40);

  requestAnimationFrame(() => { update(); draw(); });
}

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);
draw();
</script>
</body>
</html>
